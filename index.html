  .fade { animation: fi .15s ease; }
  @keyframes fi { from { opacity:0; transform:translateY(-3px); } to { opacity:1; transform:none; } }
</style>

<body>

<div id="root"></div>
<script type="text/babel" data-presets="react">
const SHEET_URL = "https://script.google.com/macros/s/AKfycby64LCZMvIMQhLaEsbEJt9dac_mEEnQKZnYNptuROBpK7zpFGDS-Ncz8QDvtLVvV5af/exec";

const PARTNERS = [
  { name:"Warren",  h:[9,9.5], pm:[180,210] }, { name:"Syed",    h:[9,9.5], pm:[180,210] },
  { name:"Jenish",  h:[9,9.5], pm:[180,210] }, { name:"Lewis",   h:[9,9.5], pm:[180,210] },
  { name:"Robyn",   h:[9,9.5], pm:[180,210] }, { name:"James",   h:[9,9.5], pm:[180,210] },
  { name:"Maria",   h:[8.5],   pm:[180,210] }, { name:"Wayne",   h:[3,6],   pm:[90]       },
  { name:"David",   h:[7.5],   pm:[50]      }, { name:"Rob",     h:[10],    pm:[240]      },
  { name:"Arun",    h:[9,9.5], pm:[180,210] }, { name:"Nana",    h:[8],     pm:[180,210]  },
  { name:"Darren",  h:[9,9.5], pm:[180,210] }, { name:"Maxime",  h:[8.5],   pm:[180,210]  },
  { name:"Ahmad",   h:[9,9.5], pm:[180,210] }, { name:"Renin",   h:[9,9.5], pm:[180,210]  },
  { name:"Deji",    h:[6.5],   pm:[60]      }, { name:"Xander",  h:[9,9.5], pm:[180,210]  },

const AMBIENT = [

const C = {

const fmt = m => {
  m = Math.abs(Math.round(m));
  const h = Math.floor(m/60), min = m%60;
  if (!h) return `${min}m`;
  if (!min) return `${h}h`;
  return `${h}h ${min}m`;
};
const qn = v => parseInt(v) || 0;
function RowInput({ initialValue, onCommit, style }) {
  const ref = useRef(null);
  const focused = useRef(false);

  useEffect(() => {
    if (ref.current && !focused.current) {
      ref.current.value = initialValue || "";
    }
  }, [initialValue]);

  return (
    <input
      ref={ref}
      type="text"
      inputMode="numeric"
      pattern="[0-9]*"
      defaultValue={initialValue || ""}
      onFocus={() => { focused.current = true; }}
      onBlur={e => {
        focused.current = false;
        const v = e.target.value.replace(/\D/g, "");
        e.target.value = v;
        onCommit(v);
      }}
      style={style}
    />
  );
}
function DepRow({ row, rate, onCommit, onRemove, accent }) {
  const qty = qn(row.qty);
  const mins = qty > 0 ? Math.ceil(qty / rate) : 0;
  const active = qty > 0;
  const bg = active ? (accent || "#f0f7f3") : C.bg;
  const border = active ? (accent ? "#2e7a52" : C.green) : C.border;

  return (
    <div style={{ display:"grid", gridTemplateColumns:"1fr 80px 90px 26px", gap:8, marginBottom:6, alignItems:"stretch" }}>
      <div style={{ background:bg, border:`1.5px solid ${border}`, borderRadius:8, padding:"9px 11px", fontSize:13, color:C.text, lineHeight:1.4, wordBreak:"break-word", display:"flex", alignItems:"center" }}>
        {row.dept}
      </div>
      <RowInput
        initialValue={row.qty}
        onCommit={onCommit}
        style={{ background:bg, border:`1.5px solid ${border}`, color:C.text, borderRadius:8, padding:"9px 6px", fontSize:16, fontFamily:"inherit", width:"100%", textAlign:"center", fontWeight:active?600:400 }}
      />
      <div style={{ background:C.bg, border:`1.5px solid ${C.border}`, borderRadius:8, fontSize:13, color:active?C.teal:C.dim, textAlign:"center", display:"flex", alignItems:"center", justifyContent:"center", fontWeight:active?600:400 }}>
        {active ? fmt(mins) : "—"}
      </div>
      <button onClick={onRemove} style={{ background:"none", border:"none", color:C.dim, cursor:"pointer", fontSize:18, padding:0, display:"flex", alignItems:"center", justifyContent:"center" }}>×</button>
    </div>
  );
}
function Toggle({ val, onChange, options, color = "#2980b9" }) {
  return (
    <div style={{ display:"flex", gap:6 }}>
      {options.map(o => (
        <button key={String(o.v)} onClick={() => onChange(o.v)}
          style={{ flex:1, background:val===o.v?color:"#fff", border:`1.5px solid ${val===o.v?color:C.border}`, color:val===o.v?"#fff":C.text, borderRadius:8, padding:"7px 10px", fontSize:12, fontWeight:val===o.v?700:400, cursor:"pointer", fontFamily:"inherit", minWidth:44 }}>
          {o.l}
        </button>
      ))}
    </div>
  );
}
function SimpleInput({ value, onChange, placeholder, style }) {
  const ref = useRef(null);
  const focused = useRef(false);

  useEffect(() => {
    if (ref.current && !focused.current) {
      ref.current.value = value || "";
    }
  }, [value]);

  return (
    <input
      ref={ref}
      type="text"
      inputMode="numeric"
      pattern="[0-9]*"
      defaultValue={value || ""}
      placeholder={placeholder}
      onFocus={() => { focused.current = true; }}
      onBlur={e => {
        focused.current = false;
        const v = e.target.value.replace(/\D/g, "");
        e.target.value = v;
        onChange(v);
      }}
      style={style}
    />
  );
}
function App() {
  const [date, setDate]           = useState(() => new Date().toISOString().split("T")[0]);
  const [stockType, setStockType] = useState("cases");
  const [aRows, setARows] = useState(AMBIENT.map(d => ({ dept:d, qty:"" })));
  const [fRows, setFRows] = useState(FRESH.map(d  => ({ dept:d, qty:"" })));
  const [sel,   setSel]   = useState({});
  const [selPm, setSelPm] = useState({});
  const [spotUnits,   setSpotUnits]   = useState("");
  const [lehPallets,  setLehPallets]  = useState("");
  const [w3Cages,     setW3Cages]     = useState("");
  const [l1On,        setL1On]        = useState(false);
  const [l2On,        setL2On]        = useState(false);
  const [l1Dekit,     setL1Dekit]     = useState(false);
  const [l2Dekit,     setL2Dekit]     = useState(false);
  const [l1Partners,  setL1Partners]  = useState([]);
  const [l2Partners,  setL2Partners]  = useState([]);
  const [sandwich,    setSandwich]    = useState(false);
  const [rmCages,     setRmCages]     = useState("");
  const [ecommSetup,  setEcommSetup]  = useState(false);
  const [ecommItems,  setEcommItems]  = useState("");
  const [ecommPickers,setEcommPickers]= useState(1);
  const [spoilage,    setSpoilage]    = useState(0);
  const [cardboard,   setCardboard]   = useState(false);
  const [pickup,      setPickup]      = useState(0);
  const [drinksBack,  setDrinksBack]  = useState(false);
  const [crispsBack,  setCrispsBack]  = useState(false);
  const [ambFaceup,   setAmbFaceup]   = useState(false);
  const [chlFaceup,   setChlFaceup]   = useState(false);
  const [clearRoutes,   setClearRoutes]   = useState(false);
  const [clearFloor,    setClearFloor]    = useState(false);
  const [frozenCages,        setFrozenCages]        = useState("");
  const [flowersHort,        setFlowersHort]        = useState(false);
  const [tidyFrv,            setTidyFrv]            = useState(false);
  const [shiftAdmin,         setShiftAdmin]         = useState(false);
  const [exceptions,         setExceptions]         = useState(false);
  const [dekitTime,          setDekitTime]          = useState(0);
  const [multimediaPartners, setMultimediaPartners] = useState(0);
  const [dekitOption,   setDekitOption]   = useState(0);
  const [multiPartners, setMultiPartners] = useState("");
  const [saveStatus,  setSaveStatus]  = useState("saved");
  const [showBackup,  setShowBackup]  = useState(false);
  const [restoreText, setRestoreText] = useState("");
  const [restoreMsg,  setRestoreMsg]  = useState("");
  const [lastSaved,   setLastSaved]   = useState("");
  const [confirmReset,setConfirmReset]= useState(false);
  const [loaded, setLoaded] = useState(false);
  useEffect(() => {
    const saveNow = () => {
      try {
        const payload = localStorage.getItem("wnf");
        if (payload) {
          try { sessionStorage.setItem("wnf", payload); } catch(_) {}
        }
      } catch(_) {}
    };
    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "hidden") saveNow();
    });
    window.addEventListener("pagehide", saveNow);
    window.addEventListener("beforeunload", saveNow);
    return () => {
      document.removeEventListener("visibilitychange", saveNow);
      window.removeEventListener("pagehide", saveNow);
      window.removeEventListener("beforeunload", saveNow);
    };
  }, []);

  useEffect(() => { (async () => {
    try {
      let raw = null;
      // Try Google Sheets first — survives everything
      try {
        const res = await fetch("https://script.google.com/macros/s/AKfycby64LCZMvIMQhLaEsbEJt9dac_mEEnQKZnYNptuROBpK7zpFGDS-Ncz8QDvtLVvV5af/exec");
        const txt = await res.text();
        if (txt && txt.startsWith("{")) raw = txt;
      } catch(_) {}
      // Fallback to localStorage
      if (!raw) { try { raw = localStorage.getItem("wnf") || localStorage.getItem("wnf-b"); } catch(_) {} }
      if (raw) {
      const d = JSON.parse(raw);
      if (d.date) setDate(d.date);
      if (d.stockType) setStockType(d.stockType);
      if (d.aRows) setARows(AMBIENT.map(dept => ({ dept, qty: d.aRows.find(r=>r.dept===dept)?.qty ?? "" })));
      if (d.fRows) setFRows(FRESH.map(dept   => ({ dept, qty: d.fRows.find(r=>r.dept===dept)?.qty ?? "" })));
      if (d.sel)   setSel(d.sel);
      if (d.selPm) setSelPm(d.selPm);
      if (d.spotUnits  != null) setSpotUnits(d.spotUnits);
      if (d.lehPallets != null) setLehPallets(d.lehPallets);
      if (d.w3Cages    != null) setW3Cages(d.w3Cages);
      if (d.l1On       != null) setL1On(d.l1On);
      if (d.l2On       != null) setL2On(d.l2On);
      if (d.l1Dekit    != null) setL1Dekit(d.l1Dekit);
      if (d.l2Dekit    != null) setL2Dekit(d.l2Dekit);
      if (d.l1Partners) setL1Partners(d.l1Partners);
      if (d.l2Partners) setL2Partners(d.l2Partners);
      if (d.sandwich   != null) setSandwich(d.sandwich);
      if (d.rmCages    != null) setRmCages(d.rmCages);
      if (d.ecommSetup != null) setEcommSetup(d.ecommSetup);
      if (d.ecommItems != null) setEcommItems(d.ecommItems);
      if (d.ecommPickers!=null) setEcommPickers(d.ecommPickers);
      if (d.spoilage   != null) setSpoilage(d.spoilage);
      if (d.cardboard  != null) setCardboard(d.cardboard);

      if (d.crispsBack != null) setCrispsBack(d.crispsBack);
      if (d.ambFaceup  != null) setAmbFaceup(d.ambFaceup);
      if (d.chlFaceup  != null) setChlFaceup(d.chlFaceup);
      if (d.clearRoutes!= null) setClearRoutes(d.clearRoutes);

      if (d.dekitTime    != null) setDekitTime(d.dekitTime);
      if (d.multimediaPartners != null) setMultimediaPartners(d.multimediaPartners);

    setLoaded(true);
  })(); }, []);
  useEffect(() => {
    if (!loaded) return;
    setSaveStatus("saving");
    const t = setTimeout(() => {
      try {
        const payload = JSON.stringify({
          date, stockType, aRows, fRows, sel, selPm, spotUnits, lehPallets, w3Cages,

          ambFaceup, chlFaceup, clearRoutes, clearFloor,
          frozenCages, dekitTime, multimediaPartners, flowersHort, exceptions, tidyFrv, shiftAdmin,
        });
        try {
          localStorage.setItem("wnf", payload);
          localStorage.setItem("wnf-b", payload);
          localStorage.setItem("wnf-ts", new Date().toISOString());
        } catch(_) {}
        // Save to Google Sheets
        try {
          fetch("https://script.google.com/macros/s/AKfycby64LCZMvIMQhLaEsbEJt9dac_mEEnQKZnYNptuROBpK7zpFGDS-Ncz8QDvtLVvV5af/exec", {
            method: "POST",
            headers: { "Content-Type": "text/plain" },
            body: payload
          });
        } catch(_) {}
        setSaveStatus("saved");
        setLastSaved(new Date().toLocaleTimeString());
      } catch(_) { setSaveStatus("error"); }
    }, 200);
    return () => clearTimeout(t);
  }, [date,stockType,aRows,fRows,sel,selPm,spotUnits,lehPallets,w3Cages,
      l1On,l2On,l1Dekit,l2Dekit,l1Partners,l2Partners,
      sandwich,rmCages,ecommSetup,ecommItems,ecommPickers,
      spoilage,cardboard,pickup,drinksBack,crispsBack,
      ambFaceup,chlFaceup,clearRoutes,clearFloor,
      frozenCages,dekitTime,multimediaPartners,flowersHort,exceptions,tidyFrv,shiftAdmin]);
  const resetAll = () => {
    try { localStorage.removeItem("wnf"); localStorage.removeItem("wnf-b"); } catch(_) {}
    setDate(new Date().toISOString().split("T")[0]);
    setStockType("cases"); setSel({}); setSelPm({});
    setARows(AMBIENT.map(d=>({dept:d,qty:""}))); setFRows(FRESH.map(d=>({dept:d,qty:""})));
    setSpotUnits(""); setLehPallets(""); setW3Cages("");
    setL1On(false); setL2On(false); setL1Dekit(false); setL2Dekit(false);
    setL1Partners([]); setL2Partners([]);
    setSandwich(false); setRmCages("");
    setEcommSetup(false); setEcommItems(""); setEcommPickers(1);
    setSpoilage(0); setCardboard(false); setPickup(0);
    setDrinksBack(false); setCrispsBack(false);
    setAmbFaceup(false); setChlFaceup(false);
    setClearRoutes(false); setClearFloor(false);
    setFrozenCages(""); setDekitTime(0); setMultimediaPartners(0);
    setFlowersHort(false); setExceptions(false); setTidyFrv(false); setShiftAdmin(false);
    setConfirmReset(false);
  };
  const rate = RATES[stockType];
  const activeP = PARTNERS.filter(p => sel[p.name]);
  const colleagues = activeP.length;
  const teamMins = activeP.reduce((s,p) => s + sel[p.name]*60, 0);
  const preMidMins = activeP.reduce((s,p) => s + (selPm[p.name]||0), 0);

  const allRows = useMemo(() => [...aRows,...fRows], [aRows,fRows]);
  const ambQty  = useMemo(() => aRows.reduce((s,r)=>s+qn(r.qty),0), [aRows]);
  const freshQty= useMemo(() => fRows.reduce((s,r)=>s+qn(r.qty),0), [fRows]);
  const totalQty= ambQty + freshQty;
  const ambMins = Math.ceil(ambQty/rate);
  const freshMins=Math.ceil(freshQty/rate);
  const stockMins=ambMins+freshMins;

  const spotBase  = spotUnits !== "" ? qn(spotUnits) : ambQty;
  const spotMins  = Math.ceil(spotBase * SPOT_RATE);
  const lehMins   = qn(lehPallets)*60;
  const w3Mins    = qn(w3Cages)*60;
  const l1Mins    = l1On ? l1Partners.length * (l1Dekit?60:40) : 0;
  const l2Mins    = l2On ? l2Partners.length * (l2Dekit?60:40) : 0;
  const lorryMins = l1Mins+l2Mins;
  const sandMins  = sandwich?25:0;
  const rmMins    = Math.ceil(qn(rmCages)*8.25);
  const setupMins = ecommSetup?40:0;
  const ecommSolo = qn(ecommItems)>0?Math.ceil(qn(ecommItems)/ECOMM_RATE):0;
  const ecommTeam = ecommSolo>0&&ecommPickers>0?Math.ceil(ecommSolo/ecommPickers):ecommSolo;
  const spMins    = spoilage;
  const cardMins  = cardboard?120:0;
  const pickMins  = pickup;
  const drMins    = drinksBack?60:0;
  const crMins    = crispsBack?30:0;
  const ambFMins  = ambFaceup?600:0;
  const chlFMins  = chlFaceup?180:0;
  const routeMins   = clearRoutes?30:0;
  const floorMins   = clearFloor?60:0;
  const frozenMins    = qn(frozenCages)*60;
  const flowersHortMins = flowersHort ? 60 : 0;
  const tidyFrvMins     = tidyFrv ? 45 : 0;
  const shiftAdminMins  = shiftAdmin ? 20 : 0;
  const exceptionsMins  = exceptions ? 60 : 0;
  const dekitMins   = dekitOption>0?dekitOption:0;
  const multiMins   = qn(multiPartners)*40;

  const fixedMins = spotMins+lehMins+w3Mins+lorryMins+sandMins+rmMins+
    setupMins+ecommSolo+spMins+cardMins+pickMins+drMins+crMins+
    ambFMins+chlFMins+routeMins+floorMins+frozenMins+dekitMins+multiMins+flowersHortMins+exceptionsMins+tidyFrvMins+shiftAdminMins;
  const totalNeeded = stockMins+fixedMins;
  const slack = teamMins-totalNeeded;
  const util  = teamMins>0?Math.min(100,Math.round(totalNeeded/teamMins*100)):0;
  const stColor = slack<0?C.red:slack<120?C.amber:C.teal;
  const stLabel = slack<0?"Overloaded":slack<120?"Tight":"On Track";
  const cloudSave = async () => {
    try {
      const payload = localStorage.getItem("wnf") || "{}";
      setRestoreMsg("Saving to cloud...");
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-6", max_tokens: 50,
          messages: [{ role: "user", content: "Store this shift data (reply only STORED): " + payload }]
        })
      });
      const d = await res.json();
      if (d?.content?.[0]?.text) {
        setRestoreMsg("✓ Saved to cloud!");
        setTimeout(() => setRestoreMsg(""), 3000);
      } else { setRestoreMsg("✗ Cloud save failed"); }
    } catch(e) { setRestoreMsg("✗ " + e.message); }
  };

  const cloudLoad = async () => {
    try {
      setRestoreMsg("Loading from cloud...");
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-6", max_tokens: 8000,
          messages: [{ role: "user", content: "Retrieve the last stored shift data JSON" }]
        })
      });
      const d = await res.json();
      const txt = d?.content?.[0]?.text?.trim();
      if (txt) {
        try {
          JSON.parse(txt);
          localStorage.setItem("wnf", txt);
          setRestoreMsg("✓ Loaded! Reloading...");
          setTimeout(() => window.location.reload(), 800);
        } catch(_) { setRestoreMsg("✗ Invalid data"); }
      } else { setRestoreMsg("✗ No data found"); }
    } catch(e) { setRestoreMsg("✗ " + e.message); }
  };

  const doRestore = () => {
    try {
      let txt = restoreText.trim();
      if (txt.startsWith("WNSAVE:")) txt = txt.slice(7);
      if (txt.includes("%22")) txt = decodeURIComponent(txt);
      JSON.parse(txt);
      localStorage.setItem("wnf", txt);
      setRestoreMsg("✓ Restored! Reloading...");
      setTimeout(() => window.location.reload(), 800);
    } catch(_) { setRestoreMsg("✗ Invalid backup data"); }

    window.addEventListener("pagehide", hideHandler);

          </div>
          <div style={{ fontSize:10, fontWeight:700, color:C.green, letterSpacing:2, textTransform:"uppercase", marginBottom:7 }}>Ambient</div>
          {aRows.map((row,i) => (
            <DepRow key={row.dept||`a-${i}`} row={row} rate={rate}
              onCommit={v => commitARow(i,v)}
              onRemove={() => removeARow(i)}
            />
          ))}
          <div style={{ fontSize:10, fontWeight:700, color:C.light, letterSpacing:2, textTransform:"uppercase", marginTop:12, marginBottom:7, paddingTop:10, borderTop:`1px solid ${C.border}` }}>Fresh</div>
          {fRows.map((row,i) => (
            <DepRow key={row.dept||`f-${i}`} row={row} rate={rate} accent="#f0f9f4"
              onCommit={v => commitFRow(i,v)}
              onRemove={() => removeFRow(i)}
            />
          ))}
          <div style={{ display:"grid", gridTemplateColumns:"1fr 80px 90px 26px", gap:8, marginTop:12, paddingTop:12, borderTop:`2px solid ${C.green}22` }}>
            <div style={{ fontSize:11, fontWeight:700, color:C.green, textTransform:"uppercase" }}>Total</div>
            <div style={{ fontSize:14, fontWeight:700, color:C.green, textAlign:"center" }}>{totalQty}</div>
            <div style={{ fontSize:13, fontWeight:700, color:C.teal, textAlign:"center" }}>{stockMins>0?fmt(stockMins):"—"}</div>
            <div/>
          </div>
          {totalQty>0&&<div style={{ marginTop:14, paddingTop:12, borderTop:`1px solid ${C.border}`, display:"flex", flexDirection:"column", gap:5 }}>
            {allRows.filter(r=>qn(r.qty)>0).map((r,i)=>{
              const pct=Math.round(qn(r.qty)/totalQty*100);
              return (
                <div key={r.dept} style={{ display:"flex", alignItems:"center", gap:8 }}>
                  <div style={{ width:150, fontSize:11, color:C.text, wordBreak:"break-word", lineHeight:1.3 }}>{r.dept}</div>
                  <div style={{ flex:1, background:C.bg, borderRadius:3, height:7 }}>
                    <div style={{ width:`${pct}%`, height:"100%", borderRadius:3, background:`hsl(${140+(i*22)%80},52%,${40+(i%3)*7}%)` }}/>
                  </div>
                  <div style={{ width:40, fontSize:11, color:C.muted, textAlign:"right" }}>{r.qty}</div>
                  <div style={{ width:30, fontSize:11, color:C.dim, textAlign:"right" }}>{pct}%</div>
                </div>
              );
            })}
          </div>}
        </div>

        {/* SPLITTING */}
        <div style={{ ...card, borderTop:`3px solid #e91e8c` }}>
          <div style={secLabel("#e91e8c")}>Splitting</div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
            <div style={{ background:C.bg, borderRadius:10, padding:"12px" }}>
              <div style={{ fontSize:12, fontWeight:700, marginBottom:2 }}>🥪 Sandwiches</div>
              <div style={{ fontSize:11, color:C.muted, marginBottom:10 }}>Fixed · 25 min</div>
              <Toggle val={sandwich} onChange={setSandwich} options={[{v:true,l:"Yes"},{v:false,l:"No"}]} color="#e91e8c"/>
              {sandwich&&<div style={{ marginTop:8, fontSize:22, fontWeight:700, color:"#e91e8c" }}>25m</div>}
            </div>
            <div style={{ background:C.bg, borderRadius:10, padding:"12px" }}>
              <div style={{ fontSize:12, fontWeight:700, marginBottom:2 }}>🍱 Ready Meals</div>
              <div style={{ fontSize:11, color:C.muted, marginBottom:10 }}>8m 15s per cage</div>
              <SimpleInput value={rmCages} onChange={setRmCages} placeholder="0 cages"
                style={{ ...inp(qn(rmCages)>0,"#e91e8c"), fontSize:16 }}/>
              {qn(rmCages)>0&&<div style={{ marginTop:8, fontSize:22, fontWeight:700, color:"#e91e8c" }}>{fmt(rmMins)}</div>}
            </div>
          </div>
        </div>

        {/* MULTIMEDIA */}
        <div style={{ ...card, borderTop:`3px solid #ff9800` }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
            <div><div style={secLabel("#ff9800")}>Partner Multimedia</div><div style={{ fontSize:12, color:C.muted }}>40 min per partner</div></div>
            {multiMins>0&&<div style={{ textAlign:"right" }}><div style={{ fontSize:26, fontWeight:700, color:"#ff9800" }}>{fmt(multiMins)}</div><div style={{ fontSize:11, color:C.muted }}>{multiPartners} partner{qn(multiPartners)!==1?"s":""}</div></div>}
          </div>
          <div style={{ fontSize:11, color:C.muted, textTransform:"uppercase", letterSpacing:1, marginBottom:6 }}>Number of Partners</div>
          <SimpleInput value={multiPartners} onChange={setMultiPartners} placeholder="0" style={{ ...inp(qn(multiPartners)>0,"#ff9800"), fontSize:16 }}/>
        </div>

        {/* OTHER TASKS */}
        <div style={{ ...card, borderTop:`3px solid #2980b9` }}>
          <div style={secLabel("#2980b9")}>Other Tasks</div>
          <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
            {[
              {label:"🗑️ Spoilage",         sub:"Sort & clear",                      content:<Toggle val={spoilage}    onChange={setSpoilage}    options={[{v:0,l:"Off"},{v:15,l:"15m"},{v:20,l:"20m"}]} color="#2980b9"/>},
              {label:"📦 Cardboard",         sub:"Inc. bale · 2 hours",               content:<Toggle val={cardboard}   onChange={setCardboard}   options={[{v:false,l:"No"},{v:true,l:"Yes"}]} color="#2980b9"/>},
              {label:"🧹 Pick Up",           sub:"Inc. racking away",                 content:<Toggle val={pickup}      onChange={setPickup}      options={[{v:0,l:"Off"},{v:60,l:"1h"},{v:90,l:"1.5h"}]} color="#2980b9"/>},
              {label:"🥤 Drinks Backstock",  sub:"Bring down, work & return · 1h",    content:<Toggle val={drinksBack}  onChange={setDrinksBack}  options={[{v:false,l:"No"},{v:true,l:"Yes"}]} color="#2980b9"/>},
              {label:"🥔 Crisps Backstock",  sub:"30 mins",                           content:<Toggle val={crispsBack}  onChange={setCrispsBack}  options={[{v:false,l:"No"},{v:true,l:"Yes"}]} color="#2980b9"/>},
              {label:"🏪 Ambient Face Up",   sub:"10 hours",                          content:<Toggle val={ambFaceup}   onChange={setAmbFaceup}   options={[{v:false,l:"No"},{v:true,l:"Yes"}]} color="#2980b9"/>},
              {label:"❄️ Chilled Face Up",   sub:"3 hours",                           content:<Toggle val={chlFaceup}   onChange={setChlFaceup}   options={[{v:false,l:"No"},{v:true,l:"Yes"}]} color="#2980b9"/>},
              {label:"🛣️ Clearing Routes",   sub:"30 mins",                           content:<Toggle val={clearRoutes} onChange={setClearRoutes} options={[{v:false,l:"No"},{v:true,l:"Yes"}]} color="#2980b9"/>},
              {label:"🏬 Clear Shop Floor",  sub:"Inc. Zorba strips · 1 hour",        content:<Toggle val={clearFloor}  onChange={setClearFloor}  options={[{v:false,l:"No"},{v:true,l:"Yes"}]} color="#2980b9"/>},
              {label:"🌅 4am Dekit",             sub:"45 min or 1 hour",                  content:<Toggle val={dekitOption} onChange={setDekitOption} options={[{v:0,l:"Off"},{v:45,l:"45m"},{v:60,l:"1h"}]} color="#2980b9"/>},
            ].map(item=>(
              <div key={item.label} style={{ background:C.bg, borderRadius:10, padding:"12px 14px", display:"flex", alignItems:"center", justifyContent:"space-between", gap:12 }}>
                <div><div style={{ fontSize:13, fontWeight:600 }}>{item.label}</div><div style={{ fontSize:11, color:C.muted }}>{item.sub}</div></div>
                {item.content}
              </div>
            ))}
            {/* Flowers & Horticultural */}
            {[
              {label:"🌸 Flowers & Horticultural",   sub:"1 hour", val:flowersHort,   setVal:setFlowersHort},
              {label:"❗ Exceptions",                  sub:"1 hour", val:exceptions,    setVal:setExceptions},
              {label:"🥬 Tidy F&V & Rackaway",           sub:"45 mins", val:tidyFrv,       setVal:setTidyFrv},
              {label:"📋 Start of Shift Admin",           sub:"20 mins", val:shiftAdmin,    setVal:setShiftAdmin},
            ].map(item=>(
              <div key={item.label} style={{ background:C.bg, borderRadius:10, padding:"12px 14px", display:"flex", alignItems:"center", justifyContent:"space-between", gap:12 }}>
                <div><div style={{ fontSize:13, fontWeight:600 }}>{item.label}</div><div style={{ fontSize:11, color:C.muted }}>{item.sub}</div></div>
                <Toggle val={item.val} onChange={item.setVal} options={[{v:false,l:"No"},{v:true,l:"Yes"}]} color="#2980b9"/>
              </div>
            ))}
            {/* Multimedia — number input */}
            <div style={{ background:C.bg, borderRadius:10, padding:"12px 14px", display:"flex", alignItems:"center", justifyContent:"space-between", gap:12 }}>
              <div>
                <div style={{ fontSize:13, fontWeight:600 }}>📱 Partner Multimedia</div>
                <div style={{ fontSize:11, color:C.muted }}>40 min per partner · {qn(multimediaPartners)>0?fmt(multiMins):""}</div>
              </div>
              <SimpleInput value={String(multimediaPartners||"")} onChange={v=>setMultimediaPartners(parseInt(v)||0)} placeholder="0"
                style={{ ...inp(qn(multimediaPartners)>0,"#2980b9"), fontSize:16, width:80, textAlign:"center" }}/>
            </div>
          </div>
        </div>

        {/* ECOMM SETUP */}
        <div style={{ ...card, borderTop:`3px solid #5a78d4` }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
            <div><div style={secLabel("#5a78d4")}>Setting Up Ecomm</div><div style={{ fontSize:12, color:C.muted }}>Fixed · 40 minutes</div></div>
            {ecommSetup&&<div style={{ fontSize:24, fontWeight:700, color:"#5a78d4" }}>40m</div>}
          </div>
          <Toggle val={ecommSetup} onChange={setEcommSetup} options={[{v:true,l:"Yes"},{v:false,l:"No"}]} color="#5a78d4"/>
        </div>

        {/* ECOMM PICKINGS */}
        <div style={{ ...card, borderTop:`3px solid #5a78d4` }}>
          <div style={secLabel("#5a78d4")}>Ecomm Pickings</div>
          <div style={{ fontSize:12, color:C.muted, marginBottom:14 }}>230 items/hr per picker</div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:14 }}>
            <div>
              <div style={{ fontSize:11, color:C.muted, textTransform:"uppercase", letterSpacing:1, marginBottom:6 }}>Total Items</div>
              <SimpleInput value={ecommItems} onChange={setEcommItems} placeholder="0" style={{ ...inp(qn(ecommItems)>0,"#5a78d4"), fontSize:16 }}/>
            </div>
            <div>
              <div style={{ fontSize:11, color:C.muted, textTransform:"uppercase", letterSpacing:1, marginBottom:6 }}>No. of Pickers</div>
              <div style={{ display:"flex", gap:5, flexWrap:"wrap" }}>
                {[1,2,3,4,5,6].map(n=>(
                  <button key={n} className="chip" onClick={()=>setEcommPickers(n)}
                    style={{ flex:1, background:ecommPickers===n?C.green:C.bg, border:`1.5px solid ${ecommPickers===n?C.green:C.border}`, color:ecommPickers===n?"#fff":C.text, borderRadius:7, padding:"8px 2px", fontSize:13, fontWeight:ecommPickers===n?700:400 }}>{n}</button>
                ))}
              </div>
              <div style={{ display:"flex", alignItems:"center", gap:8, marginTop:8 }}>
                <span style={{ fontSize:11, color:C.muted }}>Custom:</span>
                <SimpleInput value={String(ecommPickers)} onChange={v=>setEcommPickers(Math.max(1,parseInt(v)||1))} style={{ ...inp(![1,2,3,4,5,6].includes(ecommPickers),"#5a78d4"), fontSize:16 }}/>
              </div>
            </div>
          </div>
          {qn(ecommItems)>0&&(
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:8 }}>
              {[
                {label:"Solo Time", val:fmt(ecommSolo), sub:"1 picker", color:"#5a78d4"},
                {label:"Team Time", val:fmt(ecommTeam), sub:`${ecommPickers} picker${ecommPickers>1?"s":""}`, color:C.teal},
                {label:"Per Picker",val:`${Math.ceil(qn(ecommItems)/ecommPickers)}`, sub:"items each", color:C.green},
              ].map(c=>(
                <div key={c.label} style={{ background:C.bg, borderRadius:8, padding:"11px 10px", borderTop:`3px solid ${c.color}` }}>
                  <div style={{ fontSize:10, fontWeight:700, color:C.muted, textTransform:"uppercase", letterSpacing:1, marginBottom:5 }}>{c.label}</div>
                  <div style={{ fontSize:20, fontWeight:700, color:c.color }}>{c.val}</div>
                  <div style={{ fontSize:11, color:C.muted, marginTop:3 }}>{c.sub}</div>
                </div>
              ))}
            </div>
          )}
        </div>

        {/* LORRY UNLOADS */}
        <div style={{ ...card, borderTop:`3px solid #9b59b6` }}>
          <div style={secLabel("#9b59b6")}>Lorry Unloads</div>
          {[
            {label:"First Unload", time:"20:30", on:l1On, setOn:setL1On, dekit:l1Dekit, setDekit:setL1Dekit, mins:l1Mins, partners:l1Partners, idx:1},
            {label:"Second Unload",time:"00:30", on:l2On, setOn:setL2On, dekit:l2Dekit, setDekit:setL2Dekit, mins:l2Mins, partners:l2Partners, idx:2},
          ].map((lorry,li)=>(
            <div key={li} style={{ background:C.bg, borderRadius:10, padding:"14px", marginBottom:li===0?10:0 }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
                <div>
                  <div style={{ fontSize:13, fontWeight:700, color:"#9b59b6" }}>{lorry.label}</div>
                  <div style={{ fontSize:12, color:C.muted }}>🕐 {lorry.time}</div>
                </div>
                {lorry.on&&<div style={{ textAlign:"right" }}>
                  <div style={{ fontSize:22, fontWeight:700, color:"#9b59b6" }}>{fmt(lorry.mins)}</div>
                  <div style={{ fontSize:11, color:C.muted }}>{lorry.partners.length>0 ? `${lorry.partners.length} partner${lorry.partners.length>1?"s":""} × ${lorry.dekit?"1h":"40m"}` : "Assign partners"}</div>
                </div>}
              </div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:lorry.on?12:0 }}>
                <div>
                  <div style={{ fontSize:11, color:C.muted, textTransform:"uppercase", letterSpacing:1, marginBottom:6 }}>On tonight?</div>
                  <Toggle val={lorry.on} onChange={lorry.setOn} options={[{v:true,l:"Yes"},{v:false,l:"No"}]} color="#9b59b6"/>
                </div>
                {lorry.on&&<div>
                  <div style={{ fontSize:11, color:C.muted, textTransform:"uppercase", letterSpacing:1, marginBottom:6 }}>Dekit?</div>
                  <Toggle val={lorry.dekit} onChange={lorry.setDekit} options={[{v:true,l:"Yes · 1h"},{v:false,l:"No · 40m"}]} color="#9b59b6"/>
                </div>}
              </div>
              {lorry.on&&<div>
                <div style={{ fontSize:11, color:C.muted, textTransform:"uppercase", letterSpacing:1, marginBottom:7 }}>Assign Partners ({lorry.partners.length}/2)</div>
                <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
                  {(colleagues>0?activeP:PARTNERS).map(p=>{
                    const assigned=lorry.partners.includes(p.name);
                    const disabled=!assigned&&lorry.partners.length>=2;
                    return (
                      <button key={p.name} className="chip" onClick={!disabled?()=>toggleLP(lorry.idx,p.name):undefined}
                        style={{ background:assigned?"#9b59b6":disabled?C.bg:"#fff", border:`1.5px solid ${assigned?"#9b59b6":C.border}`, color:assigned?"#fff":disabled?C.dim:C.text, borderRadius:20, padding:"5px 11px", fontSize:12, fontWeight:assigned?600:400, opacity:disabled?.4:1 }}>
                        {p.name}
                      </button>
                    );
                  })}
                </div>
              </div>}
            </div>
          ))}
        </div>

      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
document.getElementById('loading').style.display='none';
</script>
</body>
</html>
